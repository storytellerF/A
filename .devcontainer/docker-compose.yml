services:
  main:
    build:
      context: ..
      dockerfile: .devcontainer/dev.Dockerfile
      args:
        - USER_NAME=${CONTAINER_USERNAME}
    ports:
      - "6080" # noVNC web interface
      - "5901" # VNC direct connection
      - "5555" # ADB
      - "4723" # Appium
      - "22" # ssh
    environment:
      - VNC_PASSWD=${VNC_PASSWD}
      - VNC_GEOMETRY=1440x900
      - VNC_DEPTH=24
      - A_DEV_CONTAINER=true
    volumes:
      - ..:/workspace/A:cached
      - ../../AData:/workspace/AData:cached
      - ./logs:${CONTAINER_HOME}/log/supervisor
      - ./data/authorized_keys:${CONTAINER_HOME}/.ssh/authorized_keys
      - avd_data:${CONTAINER_HOME}/.android/avd
      - sdk_data:${CONTAINER_HOME}/Android/Sdk
      - bash_history:${CONTAINER_HOME}/.desktop-in-docker/.bash_history
      - gradle_data:${CONTAINER_HOME}/.gradle
      - konan_data:${CONTAINER_HOME}/.konan
      - m2_data:${CONTAINER_HOME}/.m2
      - firefox_cache:${CONTAINER_HOME}/.cache/mozilla/firefox
      - firefox_config:${CONTAINER_HOME}/.mozilla/firefox
      - vscode_data:${CONTAINER_HOME}/.vscode
      - vscode_config:${CONTAINER_HOME}/.config/Code
    shm_size: '2gb' # Allocate more shared memory
    devices:
      - /dev/kvm
    privileged: true

volumes:
  avd_data:
  sdk_data:
    name: sdk_data
    external: true
  bash_history:
  gradle_data:
  konan_data:
  m2_data:
  firefox_cache:
  firefox_config:
  vscode_data:
  vscode_config:
