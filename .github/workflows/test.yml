name: Test

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/test.yml'
      - 'app/**'
      - 'shared/**'
      - 'scripts/**'
      - 'gradle/**'
      - 'client/**'
      - 'api/**'
      - 'panel/**'
      - 'backend/**'
      - 'cloud/**'
      - 'bot/**'
      - 'bgscripts/**'
      - '*.kts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/**', 'bgscripts/**') }}
          restore-keys: |
            gradle-${{ runner.os }}-release-
            gradle-${{ runner.os }}-

      - name: Compile
        run: ./gradlew assemble --console=plain

      - name: Static check
        run: ./scripts/tool_scripts/exec-until-success.sh ./gradlew detekt --console=plain
