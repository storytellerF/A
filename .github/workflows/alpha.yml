name: Android CI

on:
  push:
    branches: [ "alpha" ]
    paths:
      - '.github/workflows/alpha.yml'
      - 'app/composeApp/**'
      - 'shared/**'
      - 'scripts/build_scripts/build-app-on-ci.sh'
      - 'scripts/tool_scripts/modify-flavor.sh'
      - 'gradle/**'
      - 'client/**'
      - 'api/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      # this will take the entire vars context configured in the repository > environments
      # setting and convert it to JSON so we can automatically assign all the values to the
      # runner's environment
      VARS_CONTEXT: ${{ toJson(vars) }}
      SECRETS_CONTEXT: ${{ toJson(secrets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build alpha app
        run: |
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link android
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link android-panel

      - uses: actions/upload-artifact@v4
        with:
          name: Signed A android Bundle
          path: |
            build/outputs/apk/release/
            build/outputs/pkg/release/
  build-desktop-deb:
    runs-on: ubuntu-latest
    env:
      # this will take the entire vars context configured in the repository > environments
      # setting and convert it to JSON so we can automatically assign all the values to the
      # runner's environment
      VARS_CONTEXT: ${{ toJson(vars) }}
      SECRETS_CONTEXT: ${{ toJson(secrets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build alpha deb
        run: |
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-deb
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-deb-panel

      - uses: actions/upload-artifact@v4
        with:
          name: Signed A deb Bundle
          path: |
            build/outputs/apk/release/
            build/outputs/pkg/release/
  build-desktop-msi:
    runs-on: windows-latest
    env:
      # this will take the entire vars context configured in the repository > environments
      # setting and convert it to JSON so we can automatically assign all the values to the
      # runner's environment
      VARS_CONTEXT: ${{ toJson(vars) }}
      SECRETS_CONTEXT: ${{ toJson(secrets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build alpha msi
        run: |
          & "C:\\Program Files\\Git\\bin\\bash.exe" -c "./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-msi"
          & "C:\\Program Files\\Git\\bin\\bash.exe" -c "./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-msi-panel"

      - uses: actions/upload-artifact@v4
        with:
          name: Signed A msi Bundle
          path: |
            build/outputs/pkg/release/
  build-desktop-dmg:
    runs-on: macos-latest
    env:
      # this will take the entire vars context configured in the repository > environments
      # setting and convert it to JSON so we can automatically assign all the values to the
      # runner's environment
      VARS_CONTEXT: ${{ toJson(vars) }}
      SECRETS_CONTEXT: ${{ toJson(secrets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build alpha msi
        run: |
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-dmg
          ./scripts/build_scripts/build-app-on-ci.sh alpha api.acommunity.link desktop-dmg-panel

      - uses: actions/upload-artifact@v4
        with:
          name: Signed A dmg Bundle
          path: |
            build/outputs/pkg/release/