server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: a-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: server
          __path__: /var/log/A/A.log
      - targets:
          - localhost
        labels:
          job: worker
          __path__: /var/log/A/A_worker.log
