global:
  scrape_interval: 15s  # 每15秒抓取一次数据
  evaluation_interval: 15s  # 每15秒评估一次规则

scrape_configs:
  - job_name: 'prometheus'  # job 名称
    static_configs:
      - targets: ['localhost:9090']  # 抓取 Prometheus 自己的 metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: [ 'pg-exporter:9187' ]
  - job_name: 'server'
    static_configs:
      - targets: [ 'server' ]