volumes:
  bw-data:

networks:
  bw-universe:
    name: bw-universe
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24
  bw-services:
    name: bw-services
  bw-docker:
    name: bw-docker

services:
  server:
    networks:
      - bw-services
  pg:
    networks:
      - bw-services
  minio:
    networks:
      - bw-services
  adminer:
    networks:
      - bw-services
  grafana:
    networks:
      - bw-services

  bunkerweb:
    image: bunkerity/bunkerweb:${BUNKER_VERSION}
    depends_on:
      - bw-db
    ports:
      - ${BUNKER_PORT}:8080
      - ${BUNKER_SECRET_PORT}:8443
    labels:
      - "bunkerweb.INSTANCE=yes"
    environment:
      - SERVER_NAME=api.acommunity.link ui.acommunity.link media.acommunity.link minio.acommunity.link adminer.acommunity.link grafana.acommunity.link
      - DATABASE_URI=${BUNKER_DB_URI}
      - API_WHITELIST_IP=127.0.0.0/8 10.20.30.0/24
      - DISABLE_DEFAULT_SERVER=yes
      - SERVE_FILES=no
      - MULTISITE=yes
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_URL=/
      - REVERSE_PROXY_WS=yes
      - USE_REAL_IP=yes
      - USE_PROXY_PROTOCOL=yes
      - REAL_IP_HEADER=proxy_protocol
      - AUTO_LETS_ENCRYPT=yes
      - EMAIL_LETS_ENCRYPT=34095089+storytellerF@users.noreply.github.com
      - LETS_ENCRYPT_CLEAR_OLD_CERTS=yes
      - USE_LIMIT_REQ=no
      - USE_BAD_BEHAVIOR=no
      - USE_MODSECURITY_CRS=no
      - ui.acommunity.link_USE_UI=yes
      - ui.acommunity.link_REVERSE_PROXY_HOST=http://bw-ui:7000
      - ui.acommunity.link_MAX_CLIENT_SIZE=50m
      - api.acommunity.link_REVERSE_PROXY_HOST=http://server:${SERVER_PORT}
      - api.acommunity.link_REVERSE_PROXY_INTERCEPT_ERRORS=no
      - api.acommunity.link_INTERCEPTED_ERROR_CODES=
      - media.acommunity.link_REVERSE_PROXY_HOST=http://minio:${MINIO_PORT}
      - media.acommunity.link_REVERSE_PROXY_INTERCEPT_ERRORS=no
      - media.acommunity.link_REVERSE_PROXY_CUSTOM_HOST=minio:9000
      - media.acommunity.link_INTERCEPTED_ERROR_CODES=
      - minio.acommunity.link_REVERSE_PROXY_HOST=http://minio:${MINIO_CONSOLE_PORT}
      - minio.acommunity.link_REVERSE_PROXY_INTERCEPT_ERRORS=no
      - minio.acommunity.link_INTERCEPTED_ERROR_CODES=
      - adminer.acommunity.link_REVERSE_PROXY_HOST=http://adminer:${DATABASE_FRONT_PORT}
      - adminer.acommunity.link_REVERSE_PROXY_INTERCEPT_ERRORS=no
      - adminer.acommunity.link_INTERCEPTED_ERROR_CODES=
      - grafana.acommunity.link_REVERSE_PROXY_HOST=http://grafana:3000
      - grafana.acommunity.link_REVERSE_PROXY_INTERCEPT_ERRORS=no
      - grafana.acommunity.link_INTERCEPTED_ERROR_CODES=
    networks:
      - bw-universe
      - bw-services

  bw-scheduler:
    image: bunkerity/bunkerweb-scheduler:${BUNKER_VERSION}
    depends_on:
      - bunkerweb
      - bw-docker
      - bw-db
    environment:
      - DATABASE_URI=${BUNKER_DB_URI}
      - DOCKER_HOST=tcp://bw-docker:2375
    networks:
      - bw-universe
      - bw-docker

  bw-docker:
    image: tecnativa/docker-socket-proxy:nightly
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - LOG_LEVEL=warning
    networks:
      - bw-docker
  bw-ui:
    image: bunkerity/bunkerweb-ui:${BUNKER_VERSION}
    depends_on:
      - bw-docker
      - bw-db
    environment:
      - DATABASE_URI=${BUNKER_DB_URI}
      - DOCKER_HOST=tcp://bw-docker:2375
      - ADMIN_USERNAME=${BUNKER_ADMIN}
      - ADMIN_PASSWORD=${BUNKER_PASS}
    networks:
      - bw-universe
      - bw-docker
    profiles:
      - bunker-ui

  bw-db:
    image: postgres
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    environment:
      - POSTGRES_DB=${BUNKER_DB}
      - POSTGRES_USER=${BUNKER_DB_USER}
      - POSTGRES_PASSWORD=${BUNKER_DB_PASS}
    volumes:
      - bw-data:/var/lib/postgresql/data
    networks:
      - bw-docker
    profiles:
      - bunker-ui

