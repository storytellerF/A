services:
  server:
    build:
      context: ../../
      args:
        BUILD_TYPE: ${BUILD_TYPE}
        FLAVOR: ${FLAVOR}
        HOST_TYPE: docker
        BUILD_ON: ${BUILD_ON}
    env_file:
      - ../../${FLAVOR}.env
    ports:
      - ${SERVER_EXPOSE_PORT}:${SERVER_PORT}
    volumes:
      - ${PRESET_PATH}:/app/deploy/preset_data
